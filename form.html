<!DOCTYPE html>
<html>
<head>
    <style>
    table {
        border: 1px solid black;
        border-spacing: 30px;
        background-color:white;
    }
        button[type="submit"] {
            padding: 15px;
            border-radius: 10px;
            background-color: #503899;
            color: white;
            width: 100%;
            font-size: 16px;
        }
    </style>
</head>
    <body style="background-color:powderblue;">
    <h1 align="center"valign="middle" style="color:rgb(24, 40, 145);">Registration Form</h1>
    <table align="center"valign="middle">
        <tr>
            <td>First Name:</td>
            <td><input type="text"name="firstname" size="20"></td>
        </tr>
        <tr>
            <td>Last Name:</td>
            <td><input type="text"name="lastname" size="20"></td>
        </tr>        
        <tr>
            <td>E-mail:</td>
            <td><input type="email"name="email" size="20"></td>
        </tr> 
        <tr>
            <td>Last Name:</td>
            <td><input type="text"name="lastname" size="20"></td>
        </tr> 
        <tr>
            <td>Password:</td>
            <td><input type="text"name="password" size="20"></td>
            <td><pattern="^(?=.*\d)(?=.*[a-zA-Z])(?=.*[^a-zA-Z0-9])\S{8,}$" 
                   title="Password must contain at least one number, 
                           one alphabet, one symbol, and be at 
                           least 8 characters long" required></pattern></td>
        </tr>
        <tr>
            <td>Re-type Password:</td>
            <td><input type="password"name="repassword" size="20" required></td>
        </tr>
        <tr>
            <td>Contact:</td>
            <td><input type="text"name="contact" size="20"></td>
        </tr>
        <tr>
            <td>Gender:</td>
            <td>
                <select name="gender">
                    <option value="Male"> Male <br>
                    <option value="Female"> Female <br>
                    <option value="Other"> Other <br>
                    <option value="NT"> Prefer Not To Say <br>
                </select>
            </td>

        </tr>
        <tr>
            <td></td>
            <td><button type="submit">Submit</button></td>
        </tr>
    </table>
    </form>
    </body>
</html>
