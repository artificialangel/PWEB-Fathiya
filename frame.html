<!DOCTYPE html>
<html>
    <head>
        <title>Table Registration Frame Practice</title>
    </head>
    
    <frameset rows="15%,5%, 70%, 10%">
        <frame name="header" scrolling="no" style="background-color:powderblue;">
        <frame name="navigation" scrolling="no" style="background-color:powderblue;">

        <frameset cols="10%,*">
                <frame name="sidebar" scrolling="no" style="background-color:powderblue;">
                <frame name ="content" style="background-color:powderblue;">
        </frameset>
        <frame name="footer" scrolling="no" style="background-color:powderblue;">
    </frameset>

</html>
